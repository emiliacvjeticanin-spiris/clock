<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Info Banner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            background-color: #121212; 
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #banner {
            width: 100%;
            height: 90px;
            background: linear-gradient(180deg, rgba(20, 20, 20, 0.95) 0%, rgba(10, 10, 10, 0.9) 100%);
            backdrop-filter: blur(15px);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            box-sizing: border-box;
            border-bottom: 0px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .info-group {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        #time-container {
            display: flex;
            align-items: center;
            font-size: 52px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .separator {
            padding: 0 2px;
        }

        #date {
            font-size: 22px;
            font-weight: 300;
            color: #ffffff;
            padding-left: 25px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            height: 30px;
            display: flex;
            align-items: center;
        }

        /* Behållare för väder - lagt till bredd för att tvinga fram widgeten */
        .weather-wrapper {
            min-width: 500px;
            transform: scale(1.1);
            transform-origin: right;
        }
    </style>
</head>
<body>

    <div id="banner">
        <div class="info-group">
            <div id="time-container">
                <span id="hour">00</span><span class="separator">:</span><span id="min">00</span>
            </div>        
            <div id="date">Laddar datum...</div>
        </div>
        
        <div class="weather-wrapper">
            <a class="weatherwidget-io" href="https://forecast7.com/sv/56d8814d81/vaxjo/" data-label_1="VÄXJÖ" data-label_2="VÄDER" data-icons="Climacons Animated" data-mode="Current" data-theme="dark" data-basecolor="rgba(255, 255, 255, 0)" data-accent="rgba(255, 255, 255, 0)" >VÄXJÖ VÄDER</a>
            <script>
            !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
            </script>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const days = ['Söndag', 'Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag', 'Lördag'];
            const months = ['januari', 'februari', 'mars', 'april', 'maj', 'juni', 'juli', 'augusti', 'september', 'oktober', 'november', 'december'];
            
            document.getElementById('hour').textContent = now.getHours().toString().padStart(2, '0');
            document.getElementById('min').textContent = now.getMinutes().toString().padStart(2, '0');
            
            const dateText = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]}`;
            document.getElementById('date').textContent = dateText;
        }
        
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
